name: Deploy DEV

on:
  push:
    branches: [develop]

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc -b

      - name: Run unit tests
        run: npm run test:unit

      - name: Install Vercel CLI
        run: npm i -g vercel

      - name: Pull Vercel environment (Preview)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Preview)
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Alias to stable dev URL
        run: vercel alias ${{ steps.deploy.outputs.url }} bar-chores-dev.vercel.app --token=${{ secrets.VERCEL_TOKEN }}

      - name: Print deployment URL
        run: |
          echo "Deployed to ${{ steps.deploy.outputs.url }}"
          echo "Stable dev URL: https://bar-chores-dev.vercel.app"
